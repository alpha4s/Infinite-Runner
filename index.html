                        break;
                }

                // Apply the speed multiplier to the total spacing as well, so the next pattern isn't clipped
                this.nextPatternZ -= (spacing * speedMultiplier);

                // COMBO SYSTEM: Reduce the random noise gap as distance increases
                // At distance 0, gap is between 10 and 30
                // At distance 8000, gap is between 0 and 5
                let maxGap = Math.max(5, 30 - (distance / 320));
                let minGap = Math.max(0, 10 - (distance / 800));
                let noiseGap = Math.random() * (maxGap - minGap) + minGap;

                this.nextPatternZ -= noiseGap;
            }

            update(timestamp) {
                // Optimization: Pre-calculate lookahead biome once per frame for all scenery props
                let lookaheadDistance = this.gm.distance + 230;
                let lookaheadZoneIdx = Math.floor(lookaheadDistance / this.gm.zoneInterval) % this.gm.baseZones.length;
                let target = this.gm.baseZones[lookaheadZoneIdx].name;

                // Frustum culling: cache the static camera frustum since the camera never moves
                if (!this._frustumCached) {
                    this._frustum = this._frustum || new THREE.Frustum();
                    this._projMatrix = this._projMatrix || new THREE.Matrix4();
                    this.gm.camera.updateMatrixWorld(); // Ensure matrix is ready on frame 1
                    this._projMatrix.multiplyMatrices(this.gm.camera.projectionMatrix, this.gm.camera.matrixWorldInverse);
                    this._frustum.setFromProjectionMatrix(this._projMatrix);
                    this._frustumCached = true;
                }

                // Cell-based scenery scrolling & recycling
                for (let c = 0; c < this.cells.length; c++) {
                    const cell = this.cells[c];

                    // Scroll every object in this cell via its InstancedMesh container
                    for (let i = 0; i < cell.instancedMeshesArray.length; i++) {
                        const inst = cell.instancedMeshesArray[i];
                        inst.position.z += this.gm.gameSpeed;
                    }

                    cell.zStart += this.gm.gameSpeed;
                    cell.zEnd += this.gm.gameSpeed;

                    // Recycle cell once its trailing edge passes the camera
                    if (cell.zStart > 15) {
                        // Find the backmost cell to place behind it
                        let backZ = Infinity;
                        for (let j = 0; j < this.cells.length; j++) {
                            if (j !== c && this.cells[j].zStart < backZ) backZ = this.cells[j].zStart;
                        }
                        const newZ = backZ - CELL_DEPTH;

                        if (target) {
                            this.recycleCell(cell, newZ, target);
                        } else {
                            this.repositionCell(cell, newZ);
                        }
                    }
                }

                const m4 = this._m4;
                const mScale0 = this._mScale0;
                let coinsUpdated = false;
                let sObsUpdated = false;
                let tObsUpdated = false;

                const pPosX = this.player.mesh.position.x;
                const pPosY = this.player.mesh.position.y;
                const pPosZ = this.player.mesh.position.z;
                const playerBottom = pPosY - 0.25;
                const playerTop = pPosY + 0.25;

                // Update Interactive Entities (reverse-iterate for safe removal)
                for (let i = this.entities.length - 1; i >= 0; i--) {
                    const ent = this.entities[i];

                    // Move entity
                    ent.position.z += (ent.userData.type === 'traffic') ? (this.gm.gameSpeed * TRAFFIC_SPEED_MULT) : this.gm.gameSpeed;

                    // Garbage Collect past the player
                    if (ent.position.z > 15) {
                        this.recycleEntity(ent);
                        this.entities[i] = this.entities[this.entities.length - 1];
                        this.entities.pop();
                        continue;
                    }

                    // Simple proximity check instead of full Frustum culling
                    if (ent.position.z > -150) {
                        this.updateEntityLogic(ent, timestamp);
                        const hit = this.checkEntityCollisions(ent, pPosX, pPosY, pPosZ, playerBottom, playerTop);
                        if (hit) {
                            this.handleEntityHit(ent, i);
                            continue;
                        }
                    }
                }

                // If our frontier cursor slides passed WORLD_DEPTH boundary via scroll speed, we have room to spawn new segment out of bounds
                this.nextPatternZ += this.gm.gameSpeed;
                while (this.nextPatternZ > -WORLD_DEPTH) {
                    this.spawnNextPattern();
                }

                // Trigger independent Powerup Spawns
                if (this.gm.distance >= this.nextPowerupDistance) {
                    this.createPowerup(this.getLanes()[0], -WORLD_DEPTH);
                    this.nextPowerupDistance += POWERUP_SPAWN_INTERVAL;
                }
            } // END OF update()
            updateEntityLogic(ent, timestamp) {
                if (ent.userData.type === 'coin' || ent.userData.isPowerup) {
                    ent.rotation.y += 0.05;
                } else if (ent.userData.type === 'ramp') {
                    ent.userData.arrow.rotation.y += 0.05;
                } else if (ent.userData.type === 'laser') {
                    ent.userData.timer += ent.userData.speedMod * (this.gm.gameSpeed / BASE_SPEED);
                    if (ent.userData.timer > 60) {
                        ent.userData.timer = 0;
                        ent.userData.isTop = !ent.userData.isTop;
                    }
                    const targetY = ent.userData.isTop ? 1.2 : -0.5;
                    ent.userData.beam.position.y += (targetY - ent.userData.beam.position.y) * 0.3;
                }

                // Magnet buff pulls coins using a cheap 1D "wall crash" check
                if (ent.userData.type === 'coin' && this.player.hasMagnet) {
                    const px = this.player.mesh.position.x;
                    const py = this.player.mesh.position.y;
                    const pz = this.player.mesh.position.z;

                    // Forward in 3D is -Z. Pull if coin is within MAGNET_PULL_RANGE (-Z) and not far behind (+Z)
                    if (ent.position.z > pz - MAGNET_PULL_RANGE - 10 && ent.position.z < pz + 2) {
                        ent.position.x += (px - ent.position.x) * MAGNET_PULL_STRENGTH;
                        ent.position.y += (py - ent.position.y) * MAGNET_PULL_STRENGTH;
                        ent.position.z += (pz - ent.position.z) * MAGNET_PULL_STRENGTH;
                        ent.userData.isTrackedByMagnet = true;
                    } else {
                        ent.userData.isTrackedByMagnet = false;
                    }
                }
            }

            checkEntityCollisions(ent, pPosX, pPosY, pPosZ, playerBottom, playerTop) {
                const ePos = ent.position;
                const type = ent.userData.type;

                // 1. HORIZONTAL DISTANCES
                const dx = pPosX - ePos.x;
                const dz = pPosZ - ePos.z;
                const distSq = dx * dx + dz * dz;

                // --- NAIVE RADIAL LOGIC ---

                if (type === 'obstacle') {
                    const wallHeight = ent.userData.isTall ? 3.0 : 1.0;
                    if (Math.abs(dx) < 1.1 && Math.abs(dz) < 0.5) {
                        if (playerBottom < wallHeight) return true;
                    }
                }

                else if (type === 'traffic') {
                    if (Math.abs(dx) < 0.9 && Math.abs(dz) < 1.25) {
                        if (playerBottom < 1.1) return true;
                    }
                }

                else if (type === 'laser') {
                    const beamY = ent.position.y + ent.userData.beam.position.y;
                    if (Math.abs(dz) < 0.8) {
                        if (beamY > playerBottom && beamY < playerTop) return true;
                    }
                }

                else if (type === 'ramp') {
                    if (Math.abs(dz) < 1.5 && Math.abs(dx) < 1.2) {
                        if (pPosY < 1.2) {
                            this.player.isJumping = true;
                            this.player.jumpVelocity = JUMP_FORCE * RAMP_BOOST_MULTIPLIER;
                        }
                    }
                }

                else if (type === 'coin' || ent.userData.isPowerup) {
                    const collectRadius = ent.userData.isTrackedByMagnet ? 1.8 : 1.2;
                    const dy = pPosY - ePos.y;
                    if ((distSq + dy * dy) < collectRadius * collectRadius) return true;
                }

                return false;
            }

            handleEntityHit(ent, i) {
                if (ent.userData.type === 'coin') {
                    this.gm.coinsCollected++;
                    const doubleChance = window.shopManager.upgrades.coin_multiplier.level * 0.10;
                    if (Math.random() < doubleChance) {
                        this.gm.coinsCollected++; // Add an extra coin
                    }
                } else if (ent.userData.isPowerup) {
                    this.player.activatePowerup(ent.userData.type);
                } else if (ent.userData.type === 'obstacle' || ent.userData.type === 'traffic' || ent.userData.type === 'laser') {
                    this.player.takeDamage();
                }

                // Entity is consumed — swap-and-pop for O(1) removal
                this.recycleEntity(ent);
                this.entities[i] = this.entities[this.entities.length - 1];
                this.entities.pop();
            }
            recycleEntity(ent) {
                ent.visible = false;
                if (ent.userData.type === 'coin') {
                    if (ent.userData.shadowMesh) {
                        ent.userData.shadowMesh.visible = false;
                        this.coinShadowPool.push(ent.userData.shadowMesh);
                        ent.userData.shadowMesh = null;
                    }
                    this.pools.coin.push(ent);
                } else if (ent.userData.type === 'obstacle') {
                    if (ent.userData.isTall) {
                        this.pools.tObs.push(ent);
                    } else {
                        this.pools.sObs.push(ent);
                    }
                } else {
                    let poolKey = ent.userData.type;
                    if (this.pools[poolKey]) {
                        this.pools[poolKey].push(ent);
                    } else {
                        this.scene.remove(ent);
                    }
                }
            }
        } // END OF Spawner CLASS

    </script>

    <script id="module-shop">
        class ShopManager {
            constructor(uiManager) {
                this.ui = uiManager;

                this.mainMenuUI = document.getElementById('main-menu');
                this.shopUI = document.getElementById('shop-ui');
                this.gameUI = document.getElementById('ui-layer');
                this.shopItemsContainer = document.getElementById('shop-items-container');
                this.menuCoinDisplay = document.getElementById('menu-coin-display');
                this.shopCoinDisplay = document.getElementById('shop-coin-display');

                this.btnStart = document.getElementById('btn-start');
                this.btnShop = document.getElementById('btn-shop');
                this.btnShopBack = document.getElementById('btn-shop-back');
                this.btnReset = document.getElementById('btn-reset');

                this.btnSpeed1 = document.getElementById('btn-speed-1');
                this.btnSpeed15 = document.getElementById('btn-speed-15');
                this.btnSpeed2 = document.getElementById('btn-speed-2');

                this.startSpeedMult = 1.0;

                this.bindEvents();

                this.vaultCoins = 0;
                this.lifetimeStats = { topScore: 0, topDist: 0, topCoins: 0 };
                this.upgrades = {
                    magnet_duration: { level: 0, max: 5 },
                    shield_duration: { level: 0, max: 5 },
                    extra_lives: { level: 0, max: 2 },
                    coin_multiplier: { level: 0, max: 5 },
                    slow_start: { level: 0, max: 3 }
                };

                this.upgradeConfigs = {
                    'magnet_duration': { name: 'Magnet Capacitor', desc: 'Increases Magnet duration by 1s per level.', baseCost: 1000, scale: 1.5 },
                    'shield_duration': { name: 'Titanium Plating', desc: 'Increases Shield duration by 1s per level.', baseCost: 1000, scale: 1.5 },
                    'extra_lives': { name: 'Backup Core', desc: 'Start with an extra heart.', baseCost: 5000, scale: 3.0 },
                    'coin_multiplier': { name: 'Greed Protocol', desc: '10% chance per level to double collected coins.', baseCost: 2000, scale: 1.5 },
                    'slow_start': { name: 'Inertia Dampeners', desc: 'Slows the starting run speed ramp-up.', baseCost: 3000, scale: 1.8 }
                };

                this.loadProgress();
            }

            bindEvents() {
                this.btnShop.addEventListener('click', () => {
                    this.mainMenuUI.style.display = 'none';
                    this.shopUI.style.display = 'flex';
                    this.renderShop();
                });

                this.btnShopBack.addEventListener('click', () => {
                    this.shopUI.style.display = 'none';
                    this.mainMenuUI.style.display = 'flex';
                    this.updateDisplays();
                });

                this.btnReset.addEventListener('click', () => {
                    if (confirm("Are you sure you want to permanently delete all progress, coins, stats, and upgrades?")) {
                        localStorage.removeItem('neon_runner_coins');
                        localStorage.removeItem('neon_runner_upgrades');
                        localStorage.removeItem('neon_runner_stats');
                        localStorage.removeItem('neon_runner_speed');
                        window.location.reload();
                    }
                });

                this.btnSpeed1.addEventListener('click', () => {
                    this.startSpeedMult = 1.0;
                    localStorage.setItem('neon_runner_speed', '1.0');
                    this.updateDisplays();
                });

                this.btnSpeed15.addEventListener('click', () => {
                    if (this.lifetimeStats.topDist >= 4500) {
                        this.startSpeedMult = 1.5;
                        localStorage.setItem('neon_runner_speed', '1.5');
                        this.updateDisplays();
                    } else {
                        alert("Reach 4500m Max Distance to unlock 1.5x Speed!");
                    }
                });

                this.btnSpeed2.addEventListener('click', () => {
                    if (this.lifetimeStats.topDist >= 9000) {
                        this.startSpeedMult = 2.0;
                        localStorage.setItem('neon_runner_speed', '2.0');
                        this.updateDisplays();
                    } else {
                        alert("Reach 9000m Max Distance to unlock 2.0x Speed!");
                    }
                });
            }

            loadProgress() {
                const savedCoins = localStorage.getItem('neon_runner_coins');
                if (savedCoins) this.vaultCoins = parseInt(savedCoins, 10);

                const savedUpgrades = localStorage.getItem('neon_runner_upgrades');
                if (savedUpgrades) this.upgrades = JSON.parse(savedUpgrades);

                const savedStats = localStorage.getItem('neon_runner_stats');
                if (savedStats) this.lifetimeStats = JSON.parse(savedStats);

                const savedSpeed = localStorage.getItem('neon_runner_speed');
                if (savedSpeed) this.startSpeedMult = parseFloat(savedSpeed);

                this.updateDisplays();
            }

            saveProgress() {
                localStorage.setItem('neon_runner_coins', this.vaultCoins);
                localStorage.setItem('neon_runner_upgrades', JSON.stringify(this.upgrades));
                localStorage.setItem('neon_runner_stats', JSON.stringify(this.lifetimeStats));
                this.updateDisplays();
            }

            addCoins(amount) {
                this.vaultCoins += amount;
                this.saveProgress();
            }

            updateDisplays() {
                this.menuCoinDisplay.textContent = this.vaultCoins.toLocaleString();
                this.shopCoinDisplay.textContent = this.vaultCoins.toLocaleString();

                document.getElementById('menu-high-score').textContent = this.lifetimeStats.topScore.toLocaleString();
                document.getElementById('menu-max-dist').textContent = Math.floor(this.lifetimeStats.topDist) + " m";
                document.getElementById('menu-max-coins').textContent = this.lifetimeStats.topCoins.toLocaleString();

                // Update speed buttons appearance
                const activeColor = 'rgba(76, 175, 80, 0.8)';
                const inactiveColor = 'rgba(255, 255, 255, 0.05)';
                const lockedColor = 'rgba(0, 0, 0, 0.5)';

                this.btnSpeed1.style.background = (this.startSpeedMult === 1.0) ? activeColor : inactiveColor;
                this.btnSpeed1.title = "Normal Speed";

                if (this.lifetimeStats.topDist >= 4500) {
                    this.btnSpeed15.textContent = "1.5X";
                    this.btnSpeed15.style.background = (this.startSpeedMult === 1.5) ? activeColor : inactiveColor;
                    this.btnSpeed15.style.color = 'white';
                    this.btnSpeed15.title = "1.5x Speed";
                } else {
                    this.btnSpeed15.textContent = "🔒 1.5X";
                    this.btnSpeed15.style.background = lockedColor;
                    this.btnSpeed15.style.color = '#777';
                    this.btnSpeed15.title = "Requires 4500m Max Distance";
                }

                if (this.lifetimeStats.topDist >= 9000) {
                    this.btnSpeed2.textContent = "2.0X";
                    this.btnSpeed2.style.background = (this.startSpeedMult === 2.0) ? activeColor : inactiveColor;
                    this.btnSpeed2.style.color = 'white';
                    this.btnSpeed2.title = "2.0x Speed";
                } else {
                    this.btnSpeed2.textContent = "🔒 2.0X";
                    this.btnSpeed2.style.background = lockedColor;
                    this.btnSpeed2.style.color = '#777';
                    this.btnSpeed2.title = "Requires 9000m Max Distance";
                }
            }

            checkRunStats(score, dist, coins) {
                let updated = false;
                if (score > this.lifetimeStats.topScore) { this.lifetimeStats.topScore = score; updated = true; }
                if (dist > this.lifetimeStats.topDist) { this.lifetimeStats.topDist = dist; updated = true; }
                if (coins > this.lifetimeStats.topCoins) { this.lifetimeStats.topCoins = coins; updated = true; }

                if (updated) {
                    this.saveProgress();
                }
            }

            getUpgradeCost(key) {
                const currentLevel = this.upgrades[key].level;
                const config = this.upgradeConfigs[key];
                return Math.floor(config.baseCost * Math.pow(config.scale, currentLevel));
            }

            purchase(key) {
                const cost = this.getUpgradeCost(key);
                if (this.vaultCoins >= cost && this.upgrades[key].level < this.upgrades[key].max) {
                    this.vaultCoins -= cost;
                    this.upgrades[key].level++;
                    this.saveProgress();
                    this.renderShop();
                }
            }

            renderShop() {
                this.shopItemsContainer.innerHTML = ''; // Clear existing

                for (const key in this.upgradeConfigs) {
                    const config = this.upgradeConfigs[key];
                    const state = this.upgrades[key];
                    const cost = this.getUpgradeCost(key);
                    const isMaxed = state.level >= state.max;
                    const canAfford = this.vaultCoins >= cost;

                    let pipsHtml = '';
                    for (let i = 0; i < state.max; i++) {
                        pipsHtml += i < state.level ? '◼' : '◻';
                    }

                    const btnHtml = isMaxed
                        ? `<button class="shop-buy-btn" disabled>MAXED</button>`
                        : `<button class="shop-buy-btn" ${canAfford ? '' : 'disabled'} onclick="window.shopManager.purchase('${key}')">${cost.toLocaleString()} 💰</button>`;

                    this.shopItemsContainer.innerHTML += `
                        <div class="shop-item">
                            <div class="shop-item-info">
                                <div class="shop-item-title">${config.name}</div>
                                <div class="shop-item-desc">${config.desc}</div>
                                <div class="level-pips">${pipsHtml}</div>
                            </div>
                            ${btnHtml}
                        </div>
                    `;
                }
            }
        }

    </script>

            initEnvironment() {

                const hemiLight = new THREE.HemisphereLight(0xffeedd, 0x8899aa, 0.6);

                // Sunlight — warm directional light with shadows
                const sunPosition = new THREE.Vector3(-15, 30, -20);

                const pathGeo = new THREE.PlaneGeometry(7.5, WORLD_DEPTH);

                const path = new THREE.Mesh(pathGeo, this.pathMat);

                const lineGeo = new THREE.BoxGeometry(0.1, 0.02, WORLD_DEPTH);
                const lineMat = new THREE.MeshBasicMaterial({ color: 0xffddaa, transparent: true, opacity: 0.4 });
                const lineLeft = new THREE.Mesh(lineGeo, lineMat);
                lineLeft.position.set(-1.25, 0.02, 0); // -LANE_WIDTH / 2
                lineLeft.receiveShadow = true;
                this.scene.add(lineLeft);
                const lineRight = new THREE.Mesh(lineGeo, lineMat);
                lineRight.position.set(1.25, 0.02, 0); // LANE_WIDTH / 2
                lineRight.receiveShadow = true;
                this.scene.add(lineRight);
            }

            handleKeyDown(event) {
                if (!this.isRunning) return; // Ignore inputs on main menu

                if (this.player.isDead) {
                    if (event.code === 'KeyR') window.location.reload();
                    return; // Ignore movement inputs on death screen
                }

                switch (event.code) {
                    case 'ArrowLeft': case 'KeyA': this.player.moveLeft(); break;
                    case 'ArrowRight': case 'KeyD': this.player.moveRight(); break;
                    case 'ArrowUp': case 'KeyW': case 'Space': this.player.jump(); break;
                    case 'ArrowDown': case 'KeyS': this.player.fastFall(); break;
                }
            }

            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);

                // Camera changed shape, force Frustum to recalculate next frame
                if (this.spawner) {
                    this.spawner._frustumCached = false;
                }
            }

            init() {
                // The main compilation now happens asynchronously inside Spawner after GLBs load
                // This ensures we catch all InstancedMeshes and materials
                this.renderBackgroundLoop();
            }

            // Idle camera sweep while in menus
            renderBackgroundLoop() {
                if (this.isRunning) return;
                requestAnimationFrame(this.renderBackgroundLoop);

                // Infinite scenery pan just to look cool behind the menus
                this.spawner.scrollCells(0.2, null);

                this.renderer.render(this.scene, this.camera);
            }

            applyUpgrades() {
                const u = window.shopManager.upgrades;

                // Extra Lives
                this.player.lives = 3 + u.extra_lives.level;
                this.ui.updateLives(this.player.lives);

                // Slow Start
                this.speedScaleFactor = 0.05 - (u.slow_start.level * 0.008);
            }

            startGame() {
                if (this.isRunning) return; // Prevent double-trigger speedbug
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'flex';
                this.isRunning = true;

                this.applyUpgrades();
                this.lastTime = performance.now();
                this.animate(this.lastTime);
            }

            animate(timestamp) {
                if (!this.isRunning) return;

                requestAnimationFrame(this.animate);

                let deltaTime = timestamp - this.lastTime;
                this.lastTime = timestamp;

                // Prevent huge lag spikes from running too many ticks (e.g. tabbed out)
                if (deltaTime > 250) deltaTime = 250;

                this.accumulator += deltaTime;

                if (this.player.isDead) {
                    // One-time death execution: Deposit coins into vault and check stats
                    if (!this.hasPaidOut) {
                        window.shopManager.addCoins(this.coinsCollected);
                        window.shopManager.checkRunStats(this.score, this.distance, this.coinsCollected);
                        this.hasPaidOut = true;
                    }
                    this.renderer.render(this.scene, this.camera);
                    return;
                }

                // Process logic at fixed tick rate, independent of monitor refresh
                let ticks = 0;
                while (this.accumulator >= this.timeStep && ticks < 10) {
                    ticks++;
                    const mult = window.shopManager.startSpeedMult || 1.0;

                    // Continuous sqrt-log difficulty scaling
                    const speedScale = Math.sqrt(Math.log10(this.distance + 1)) * 2.5 * this.speedScaleFactor;
                    this.gameSpeed = (BASE_SPEED + speedScale) * mult;

                    // Allow the user's manual BASE_SPEED to act as the cap floor so it doesn't instantly decelerate
                    const effectiveMax = Math.max(MAX_SPEED, BASE_SPEED + 1) * mult;
                    if (this.gameSpeed > effectiveMax) this.gameSpeed = effectiveMax;

                    this.distance += this.gameSpeed;

                    const calculatedZoneIdx = Math.floor(this.distance / this.zoneInterval);
                    if (calculatedZoneIdx > this.currentZoneIdx) {
                        this.currentZoneIdx = calculatedZoneIdx;
                        this.targetZone = this.baseZones[this.currentZoneIdx % this.baseZones.length];

                        // Snapshot our current actual color state to lerp FROM
                        this.currentColors.bg.copy(this.scene.background);
                        this.currentColors.ground.copy(this.groundMat.color);
                        this.currentColors.path.copy(this.pathMat.color);
                        if (this.spawner && this.spawner.rockMat) this.currentColors.rock.copy(this.spawner.rockMat.color);

                        this.isTransitioningZone = true;
                        this.transitionProgress = 0;

                        this.toastEl.textContent = `ZONE ${this.currentZoneIdx + 1}: ${this.targetZone.name}`;
                        this.toastEl.style.opacity = 1;
                        setTimeout(() => { this.toastEl.style.opacity = 0; }, 3000);
                    }

                    // Only send uniform updates to the GPU when actively transitioning
                    if (this.isTransitioningZone) {
                        this.transitionProgress += 0.01;
                        if (this.transitionProgress >= 1.0) {
                            this.transitionProgress = 1.0;
                            this.isTransitioningZone = false;
                        }

                        // Lerp manually into the material color from the cached starting state
                        this.scene.background.lerpColors(this.currentColors.bg, this.targetZone.bg, this.transitionProgress);
                        this.groundMat.color.lerpColors(this.currentColors.ground, this.targetZone.ground, this.transitionProgress);
                        this.pathMat.color.lerpColors(this.currentColors.path, this.targetZone.path, this.transitionProgress);
                        if (this.spawner && this.spawner.rockMat) {
                            this.spawner.rockMat.color.lerpColors(this.currentColors.rock, this.targetZone.rock, this.transitionProgress);
                        }
                    }

                    this.score = Math.floor(this.distance) + (this.coinsCollected * 10);

                    // Throttle DOM HTML updates to run every 100ms instead of 16ms (60fps)
                    // The human eye can't read rapidly spinning math anyway, and DOM layout is incredibly heavy
                    if (timestamp - this.lastUiUpdate > 100) {
                        this.ui.updateStats(this.score, this.distance, this.coinsCollected);
                        this.lastUiUpdate = timestamp;
                    }

                    this.player.update(this.gameSpeed, timestamp);
                    this.spawner.update(timestamp);

                    this.accumulator -= this.timeStep;
                }

                this.renderer.render(this.scene, this.camera);
            }
        }

    </script>
    <script id="module-main">
        window.onload = function () {
            const game = new GameManager();
            game.init();
        };
    </script>
</body>
